<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Area Magazziniere</title>
    <link rel="icon" type="image/x-icon" href="favicon.ico">
    <link rel="stylesheet" href="css/style.css">
    <style>
        .magazzino-container { padding: 20px; }
        .officina-selector { margin-bottom: 20px; }
        .officina-selector select { padding: 10px; font-size: 16px; width: 100%; max-width: 400px; }
        .tabs { display: flex; gap: 10px; margin-bottom: 20px; }
        .tab-btn { padding: 10px 20px; background: #f0f0f0; border: none; cursor: pointer; border-radius: 5px; }
        .tab-btn.active { background: #3498db; color: white; }
        .tab-content { display: none; }
        .tab-content.active { display: block; }
        .item-card { background: #f8f9fa; padding: 15px; margin: 10px 0; border-radius: 5px; display: flex; justify-content: space-between; align-items: center; }
        .item-info { flex: 1; }
        .item-info strong { display: block; font-size: 16px; }
        .item-info span { color: #666; }
        .qty-control { display: flex; align-items: center; gap: 10px; }
        .qty-control input { width: 60px; padding: 5px; text-align: center; font-size: 16px; }
        .qty-btn { width: 30px; height: 30px; background: #3498db; color: white; border: none; border-radius: 3px; cursor: pointer; }
        .save-btn { background: #27ae60; color: white; border: none; padding: 8px 15px; border-radius: 3px; cursor: pointer; }
        .empty-badge { background: #e74c3c; color: white; padding: 3px 8px; border-radius: 3px; font-size: 12px; }
        .stock-badge { background: #27ae60; color: white; padding: 3px 8px; border-radius: 3px; font-size: 12px; }
        .low-badge { background: #f39c12; color: white; padding: 3px 8px; border-radius: 3px; font-size: 12px; }
        .nota-input { width: 100%; padding: 8px; margin-top: 5px; border: 1px solid #ddd; border-radius: 3px; }
        .storico-table { width: 100%; border-collapse: collapse; }
        .storico-table th, .storico-table td { padding: 10px; text-align: left; border-bottom: 1px solid #eee; }
        .storico-table th { background: #f8f9fa; font-weight: 600; }
        .operazione-carico { color: #27ae60; font-weight: bold; }
        .operazione-scarico { color: #e74c3c; font-weight: bold; }
        .operazione-intervento { color: #3498db; font-weight: bold; }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>Area Magazziniere</h1>
            <p id="benvenuto"></p>
            <button onclick="logout()" style="background: rgba(255,255,255,0.2); border: none; color: white; padding: 8px 15px; border-radius: 20px; cursor: pointer;">Logout</button>
        </header>
        
        <div class="magazzino-container">
            <div class="officina-selector">
                <label>Officina:</label><br>
                <span id="officinaLabel" style="font-weight: bold;"></span>
            </div>
            
            <div id="dettagliOfficina" style="display:none;">
                <div class="tabs">
                    <button class="tab-btn active" onclick="showTab('pezzi')">Pezzi di Ricambio</button>
                    <button class="tab-btn" onclick="showTab('accessori')">Accessori</button>
                    <button class="tab-btn" onclick="showTab('storico')">Storico Movimenti</button>
                </div>
                
                <div id="pezzi-tab" class="tab-content active">
                    <h3>Pezzi di Ricambio</h3>
                    <div id="listaPezzi"></div>
                </div>
                
                <div id="accessori-tab" class="tab-content">
                    <h3>Accessori</h3>
                    <div id="listaAccessori"></div>
                </div>
                
                <div id="storico-tab" class="tab-content">
                    <h3>Storico Movimenti</h3>
                    <div id="listaStorico"></div>
                </div>
            </div>
        </div>
    </div>

    <script>
        if (!sessionStorage.getItem('logged') || sessionStorage.getItem('user_ruolo') !== 'magazziniere') {
            window.location.href = 'login.html';
        }
        
        const nome = sessionStorage.getItem('user_nome') || 'Magazziniere';
        document.getElementById('benvenuto').textContent = 'Ciao ' + nome;
        caricaOfficine();
        
        async function logout() {
            await fetch(API_BASE + 'logout.php', { method: 'POST' });
            sessionStorage.clear();
            window.location.href = 'index.html';
        }
        
        async function caricaOfficine() {
            try {
                const response = await fetch(API_BASE + 'magazzino.php');
                const data = await response.json();
                if (data.success && data.officine.length > 0) {
                    const officina = data.officine[0];
                    document.getElementById('officinaLabel').textContent = officina.denominazione + 
                        ` (${officina.tot_pezzi} pezzi, ${officina.tot_accessori} accessori)`;
                    caricaMagazzino(officina.codice);
                }
            } catch (e) {
                console.error('Errore:', e);
            }
        }
        
        async function caricaMagazzino(officina) {
            try {
                const response = await fetch(API_BASE + 'magazzino.php?officina=' + officina);
                const data = await response.json();
                
                if (data.success) {
                    renderPezzi(data.pezzi);
                    renderAccessori(data.accessori);
                    caricaStorico(officina);
                }
            } catch (e) {
                console.error('Errore:', e);
            }
        }
        
        async function caricaStorico(officina) {
            try {
                const response = await fetch(API_BASE + 'magazzino.php?officina=' + officina + '&action=storico&limit=100');
                const data = await response.json();
                if (data.success) {
                    renderStorico(data.storico);
                }
            } catch (e) {
                console.error('Errore:', e);
            }
        }
        
        function renderStorico(storico) {
            const container = document.getElementById('listaStorico');
            if (!storico || storico.length === 0) {
                container.innerHTML = '<p>Nessun movimento registrato</p>';
                return;
            }
            
            let html = '<table class="storico-table">';
            html += '<tr><th>Data</th><th>Articolo</th><th>Tipo</th><th>Operazione</th><th>Quantità</th><th>Operatore</th><th>Nota</th></tr>';
            
            storico.forEach(s => {
                const data = new Date(s.data_movimento).toLocaleString('it-IT');
                const classeOp = 'operazione-' + s.operazione;
                const labelOp = s.operazione === 'carico' ? 'Carico' : (s.operazione === 'scarico' ? 'Scarico' : 'Intervento');
                const segno = s.operazione === 'scarico' ? '-' : '+';
                const operatore = s.nome_operatore ? s.nome_operatore + ' ' + s.cognome_operatore : '-';
                const nota = s.nota || '-';
                
                html += `<tr>
                    <td>${data}</td>
                    <td>${s.codice}</td>
                    <td>${s.tipo === 'pezzo' ? 'Pezzo' : 'Accessorio'}</td>
                    <td class="${classeOp}">${labelOp}</td>
                    <td>${segno}${s.quantita}</td>
                    <td>${operatore}</td>
                    <td>${nota}</td>
                </tr>`;
            });
            
            html += '</table>';
            container.innerHTML = html;
        }
        
        function renderPezzi(pezzi) {
            const container = document.getElementById('listaPezzi');
            container.innerHTML = '';
            
            if (pezzi.length === 0) {
                container.innerHTML = '<p>Nessun pezzo disponibile</p>';
                return;
            }
            
            pezzi.forEach(p => {
                const card = document.createElement('div');
                card.className = 'item-card';
                
                let badge = '';
                if (p.quantita === 0) badge = '<span class="empty-badge">Esaurito</span>';
                else if (p.quantita < 10) badge = '<span class="low-badge">Scorte basse</span>';
                else badge = '<span class="stock-badge">Disponibile</span>';
                
                card.innerHTML = `
                    <div class="item-info">
                        <strong>${p.codice}</strong>
                        <span>${p.descrizione} - €${p.costo_unitario}</span>
                        ${badge}
                    </div>
                    <div class="qty-control">
                        <button class="qty-btn" onclick="modificaQty('${p.codice}', ${p.quantita}, -1)">-</button>
                        <input type="number" id="qty_${p.codice}" value="${p.quantita}" min="0" onchange="salvaQty('pezzo', '${p.codice}', this.value)">
                        <button class="qty-btn" onclick="modificaQty('${p.codice}', ${p.quantita}, 1)">+</button>
                    </div>
                    <div style="margin-left: 10px; min-width: 150px;">
                        <input type="text" id="nota_${p.codice}" placeholder="Nota opzionale" class="nota-input" style="margin-bottom: 5px;">
                    </div>
                `;
                container.appendChild(card);
            });
        }
        
        function renderAccessori(accessori) {
            const container = document.getElementById('listaAccessori');
            container.innerHTML = '';
            
            if (accessori.length === 0) {
                container.innerHTML = '<p>Nessun accessorio disponibile</p>';
                return;
            }
            
            accessori.forEach(a => {
                const card = document.createElement('div');
                card.className = 'item-card';
                
                let badge = '';
                if (a.quantita === 0) badge = '<span class="empty-badge">Esaurito</span>';
                else if (a.quantita < 5) badge = '<span class="low-badge">Scorte basse</span>';
                else badge = '<span class="stock-badge">Disponibile</span>';
                
                card.innerHTML = `
                    <div class="item-info">
                        <strong>${a.codice}</strong>
                        <span>${a.descrizione} - €${a.costo_unitario}</span>
                        ${badge}
                    </div>
                    <div class="qty-control">
                        <button class="qty-btn" onclick="modificaQty('${a.codice}', ${a.quantita}, -1)">-</button>
                        <input type="number" id="qty_${a.codice}" value="${a.quantita}" min="0" onchange="salvaQty('accessorio', '${a.codice}', this.value)">
                        <button class="qty-btn" onclick="modificaQty('${a.codice}', ${a.quantita}, 1)">+</button>
                    </div>
                    <div style="margin-left: 10px; min-width: 150px;">
                        <input type="text" id="nota_${a.codice}" placeholder="Nota opzionale" class="nota-input" style="margin-bottom: 5px;">
                    </div>
                `;
                container.appendChild(card);
            });
        }
        
        function modificaQty(codice, attuale, delta) {
            const input = document.getElementById('qty_' + codice);
            let nuovo = parseInt(input.value) + delta;
            if (nuovo < 0) nuovo = 0;
            input.value = nuovo;
            salvaQty(codice.startsWith('A') ? 'accessorio' : 'pezzo', codice, nuovo);
        }
        
        async function salvaQty(tipo, codice, quantita) {
            const response = await fetch(API_BASE + 'magazzino.php');
            const dataOfficine = await response.json();
            const officina = dataOfficine.officine[0].codice;
            
            const notaInput = document.getElementById('nota_' + codice);
            const nota = notaInput ? notaInput.value : '';
            
            const action = tipo === 'pezzo' ? 'aggiorna_pezzo' : 'aggiorna_accessorio';
            
            try {
                const res = await fetch(API_BASE + 'magazzino.php', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        action: action,
                        officina: officina,
                        codice: codice,
                        quantita: parseInt(quantita),
                        nota: nota
                    })
                });
                const data = await res.json();
                if (!data.success) {
                    alert('Errore: ' + data.error);
                } else {
                    caricaMagazzino(officina);
                    if (notaInput) notaInput.value = '';
                }
            } catch (e) {
                console.error('Errore:', e);
            }
        }
        
        function showTab(tab) {
            document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            document.getElementById(tab + '-tab').classList.add('active');
            event.target.classList.add('active');
        }
    </script>
</body>
</html>
