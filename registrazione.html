<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registrazione Cliente</title>
    <link rel="icon" type="image/x-icon" href="favicon.ico">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>Registrazione</h1>
            <p>Crea il tuo account</p>
        </header>
        <div class="search-section">
            <form id="formRegistrazione">
                <div class="form-group">
                    <label>Nome:</label>
                    <input type="text" id="nome" required>
                </div>
                <div class="form-group">
                    <label>Cognome:</label>
                    <input type="text" id="cognome" required>
                </div>
                <div class="form-group">
                    <label>Email:</label>
                    <input type="email" id="email" required>
                </div>
                <div class="form-group">
                    <label>Telefono:</label>
                    <input type="tel" id="telefono">
                </div>
                <div class="form-group">
                    <label>Password:</label>
                    <input type="password" id="password" required>
                </div>
                <button type="submit" class="btn-primary">Registrati</button>
            </form>
            <p id="msg" style="margin-top:15px;"></p>
            <p style="margin-top:15px;">Hai già un account? <a href="login_cliente.html">Accedi</a></p>
        </div>
    </div>
    <script>
        const API_BASE = 'http://localhost/officina/api/';
        
        document.getElementById('formRegistrazione').addEventListener('submit', async (e) => {
            e.preventDefault();
            const data = {
                nome: document.getElementById('nome').value,
                cognome: document.getElementById('cognome').value,
                email: document.getElementById('email').value,
                telefono: document.getElementById('telefono').value,
                password: document.getElementById('password').value
            };
            
            const response = await fetch(API_BASE + 'registra_cliente.php', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(data)
            });
            
            const result = await response.json();
            const msg = document.getElementById('msg');
            if (result.success) {
                msg.textContent = 'Registrazione effettuata! Codice: ' + result.codice;
                msg.style.color = 'green';
                setTimeout(() => window.location.href = 'login_cliente.html', 2000);
            } else {
                msg.textContent = result.error || 'Errore';
                msg.style.color = 'red';
            }
        });
    </script>
</body>
</html>
