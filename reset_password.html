<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reset Password</title>
    <link rel="icon" type="image/x-icon" href="favicon.ico">
    <link rel="stylesheet" href="css/style.css">
    <script src="js/config.php"></script>
</head>
<body>
    <div class="container">
        <header>
            <h1>Reset Password</h1>
        </header>
        <div class="search-section">
            <form id="formReset">
                <div class="form-group">
                    <label>Email:</label>
                    <input type="email" id="email" required>
                </div>
                <button type="submit" class="btn-primary">Invia Link Reset</button>
            </form>
            <p id="msg" style="margin-top:15px;"></p>
            <p style="margin-top:15px;">Ricordi la password? <a href="login_cliente.html">Accedi</a></p>
        </div>
    </div>
    <script>
        document.getElementById('formReset').addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('email').value;
            const msg = document.getElementById('msg');

            msg.textContent = 'Invio in corso...';
            msg.style.color = '#666';

            const response = await fetch(API_BASE + 'reset_password.php', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ email })
            });

            const data = await response.json();
            if (data.success) {
                msg.textContent = 'Email inviata! Controlla la tua casella.';
                msg.style.color = 'green';
            } else {
                msg.textContent = data.error || 'Errore';
                msg.style.color = 'red';
            }
        });
    </script>
</body>
</html>
