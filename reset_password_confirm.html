<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nuova Password</title>
    <link rel="icon" type="image/x-icon" href="favicon.ico">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>Nuova Password</h1>
        </header>
        <div class="search-section">
            <form id="formPassword">
                <div class="form-group">
                    <label>Nuova Password:</label>
                    <input type="password" id="password" required minlength="6">
                </div>
                <div class="form-group">
                    <label>Conferma Password:</label>
                    <input type="password" id="password2" required minlength="6">
                </div>
                <button type="submit" class="btn-primary">Salva Password</button>
            </form>
            <p id="msg" style="margin-top:15px;"></p>
        </div>
    </div>
    <script>
        const params = new URLSearchParams(window.location.search);
        const email = params.get('email');
        const codice = params.get('codice');

        if (!email || !codice) {
            document.getElementById('msg').textContent = 'Link non valido';
            document.getElementById('msg').style.color = 'red';
            document.getElementById('formPassword').style.display = 'none';
        }

        document.getElementById('formPassword').addEventListener('submit', async (e) => {
            e.preventDefault();
            const password = document.getElementById('password').value;
            const password2 = document.getElementById('password2').value;
            const msg = document.getElementById('msg');

            if (password !== password2) {
                msg.textContent = 'Le password non coincidono';
                msg.style.color = 'red';
                return;
            }

            if (password.length < 6) {
                msg.textContent = 'La password deve avere almeno 6 caratteri';
                msg.style.color = 'red';
                return;
            }

            msg.textContent = 'Salvataggio...';
            msg.style.color = '#666';

            const response = await fetch(API_BASE + 'reset_password_confirm.php', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ email, codice, password })
            });

            const data = await response.json();
            if (data.success) {
                msg.textContent = 'Password aggiornata!';
                msg.style.color = 'green';
                setTimeout(() => window.location.href = 'login_cliente.html', 1500);
            } else {
                msg.textContent = data.error || 'Errore';
                msg.style.color = 'red';
            }
        });
    </script>
</body>
</html>
